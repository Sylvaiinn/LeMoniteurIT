services:
  # ── Next.js Application ──
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moniteur-it-app
    restart: unless-stopped
    ports:
      - "80:3000"
    environment:
      - DATABASE_URL=postgresql://moniteur:${POSTGRES_PASSWORD}@db:5432/moniteur_it?schema=public
      - REDIS_URL=redis://redis:6379
      - GROQ_API_KEY=${GROQ_API_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:-Le Moniteur IT <veilles@sl-information.fr>}
      - CRON_SECRET=${CRON_SECRET}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-https://veilles.sl-information.fr}
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - moniteur-net

  # ── PostgreSQL Database ──
  db:
    image: postgres:16-alpine
    container_name: moniteur-it-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=moniteur_it
      - POSTGRES_USER=moniteur
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moniteur -d moniteur_it"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - moniteur-net

  # ── Redis (Cache & SSE pub/sub) ──
  redis:
    image: redis:7-alpine
    container_name: moniteur-it-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - moniteur-net

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

networks:
  moniteur-net:
    driver: bridge
